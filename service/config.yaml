service:
  name: openclaw-memory
  port: 9100
  host: localhost

storage:
  root: /home/dhawal/cortex-mem/cortex-mem
  backup_dir: /home/dhawal/cortex-mem/cortex-mem/snapshots

retrieval:
  embeddings: false
  default_limit: 10
  index_path: /home/dhawal/cortex-mem/cortex-mem/index/embeddings.db

weights:
  decay_rate: 0.995
  boost_factor: 1.1
  decay_factor: 0.9
  min_weight: 0.1
  max_weight: 5.0
  category_initial:
    user_teaching: 2.0
    user_correction: 1.8
    self_correction: 1.5
    achievement: 1.3
    decision: 1.2
    failure: 1.0
    observation: 0.8
    fact: 1.0
    skill: 1.2
    pattern: 1.0

backup:
  enabled: false
  schedule: "0 4 * * *"
  retention_days: 30
